<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>明隧桌面端</title>
    <script>
        try {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark')
            }
        } catch (_) {}
    </script>
    <style>
        :root {
            color: #202735;
            background: #f4f6fa;
            font-family: Inter, "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        :root.dark {
            color: #eef2f8;
            background: #111827;
        }

        html,
        body,
        #root {
            min-width: 1040px;
            min-height: 100vh;
            margin: 0;
            background: inherit;
        }

        .boot-shell {
            display: flex;
            min-height: 100vh;
            background:
                linear-gradient(90deg, rgba(232, 237, 246, 0.72) 0 1px, transparent 1px 100%),
                linear-gradient(180deg, rgba(232, 237, 246, 0.72) 0 1px, transparent 1px 100%),
                #f4f6fa;
            background-size: 36px 36px;
        }

        .dark .boot-shell {
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 100%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 100%),
                #111827;
        }

        .boot-sidebar {
            width: 18rem;
            border-right: 1px solid rgba(77, 91, 124, 0.16);
            background: rgba(248, 250, 252, 0.94);
            box-shadow: 10px 0 30px rgba(30, 41, 59, 0.045);
        }

        .dark .boot-sidebar {
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(24, 27, 36, 0.76);
        }

        .boot-main {
            flex: 1;
            min-width: 0;
        }

        .boot-topbar {
            height: 72px;
            border-bottom: 1px solid rgba(77, 91, 124, 0.12);
            background: rgba(248, 250, 252, 0.86);
        }

        .dark .boot-topbar {
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(24, 27, 36, 0.76);
        }

        .boot-content {
            padding: 24px;
        }

        .boot-card {
            height: 148px;
            max-width: 680px;
            border: 1px solid rgba(77, 91, 124, 0.13);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 12px 30px rgba(30, 41, 59, 0.045);
        }

        .dark .boot-card {
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(24, 27, 36, 0.76);
        }
    </style>
</head>
<body>
<div id="root">
    <div class="boot-shell">
        <aside class="boot-sidebar"></aside>
        <main class="boot-main">
            <header class="boot-topbar"></header>
            <section class="boot-content">
                <div class="boot-card"></div>
            </section>
        </main>
    </div>
</div>
<script src="./src/main.tsx" type="module"></script>
</body>
</html>
